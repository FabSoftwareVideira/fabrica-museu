  <!-- Pontos roxos -->
  <circle cx="260" cy="230" r="8" fill="#7A4FA3"></circle>
  <circle cx="280" cy="250" r="10" fill="#7A4FA3"></circle>
  <circle cx="240" cy="250" r="9" fill="#7A4FA3"></circle>
</svg>