# 1. Formato de log detalhado (deve estar no bloco http ou antes do server)
log_format otimizado_app '$remote_addr - $remote_user [$time_local] '
'"$request" $status $body_bytes_sent '
'"$http_referer" "$http_user_agent" '
'rt=$request_time urt=$upstream_response_time '
'cache=$upstream_cache_status';

# 2. Definição do Upstream (Node.js)
upstream fabrica_backend {
    server fabrica-museu-prod:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Logs - Ativa o formato novo
    access_log /var/log/nginx/access.log otimizado_app;
    error_log /var/log/nginx/error.log warn;

    # --- IDENTIFICAÇÃO DE IP REAL (Vindo do SWAG) ---
    # Ajuste para o range da sua rede Docker (geralmente 172.x.x.x)
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;

    # Segurança e Limites
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # client_max_body_size 32m;

    # Páginas de Erro Personalizadas
    error_page 404 /errors/404.html;
    error_page 502 /errors/502.html;
    error_page 500 503 504 /errors/50x.html;

    location ^~ /errors/ {
        root /etc/nginx;
        internal;
    }

    # --- CACHE: Thumbnails (30 dias) ---
    location ~* ^/public/photos/.*_thumb\.(webp|jpg|jpeg|png)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Cache-Status $upstream_cache_status;

        # Silencia logs de sucesso para estes arquivos
        access_log off;
        log_not_found off;
    }

    # --- CACHE: Imagens Originais (7 dias) ---
    location ~* ^/public/photos/.*\.(webp|jpg|jpeg|png|gif|bmp|tiff)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;

        access_log off;
        log_not_found off;
    }

    # --- CACHE: Assets Estáticos (CSS, JS, Fonts - 60 dias) ---
    location ~* ^/public/.*\.(css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=5184000, immutable";
        add_header X-Cache-Status $upstream_cache_status;

        access_log off;
        log_not_found off;
    }

    # --- ROTA PRINCIPAL (Node.js) ---
    location / {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_intercept_errors on;

        # Repassa os headers de quem realmente acessou
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Forçamos https pois o SWAG termina o SSL
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Bufferização para maior estabilidade
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Log ligado apenas aqui para monitorar acessos às páginas e APIs
        access_log /var/log/nginx/access.log otimizado_app;
    }
}