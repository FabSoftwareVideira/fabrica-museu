# 1. Definição do formato de log (mais informativo e técnico)
log_format otimizado '$remote_addr - $remote_user [$time_local] '
'"$request" $status $body_bytes_sent '
'"$http_referer" "$http_user_agent" '
'rt=$request_time urt=$upstream_response_time '
'cache=$upstream_cache_status';

# 2. Definição do Backend
upstream fabrica_backend {
    server fabrica-museu-prod:3000;
    keepalive 16;
}

# 3. Redirecionamento HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# 4. Servidor Principal (HTTPS)
server {
    listen 443 ssl http2;
    server_name _;

    # Logs
    access_log /var/log/nginx/access.log otimizado;
    error_log /var/log/nginx/error.log warn;

    # Identificação de IP Real (Docker/Proxy reverso)
    # Ajuste o CIDR (172.x.x.x) para bater com a sua rede interna do Docker
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;

    # Certificados SSL
    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    # Otimizações SSL
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Segurança e Limites
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    client_max_body_size 32m;

    # Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    # Páginas de Erro
    error_page 404 /errors/404.html;
    error_page 502 /errors/502.html;
    error_page 500 503 504 /errors/50x.html;

    location ^~ /errors/ {
        root /etc/nginx;
        internal;
    }

    # Bloco Genérico de Proxy (para evitar repetição)
    set $proxy_defaults "1";
    # (As variáveis abaixo serão herdadas pelos locations de cache)

    # --- CACHE: Thumbnails ---
    location ~* ^/public/photos/.*_thumb\.(webp|jpg|jpeg|png)$ {
        proxy_pass http://fabrica_backend;
        include /etc/nginx/proxy_params; # Se você tiver um arquivo de params padrão

        # Configs de Cache
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Cache-Status $upstream_cache_status;

        # Silenciar logs de sucesso para estes arquivos
        access_log off;
        log_not_found off;
    }

    # --- CACHE: Imagens Originais ---
    location ~* ^/public/photos/.*\.(webp|jpg|jpeg|png|gif|bmp|tiff)$ {
        proxy_pass http://fabrica_backend;

        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;

        access_log off;
        log_not_found off;
    }

    # --- CACHE: Assets Estáticos (CSS, JS, Fonts) ---
    location ~* ^/public/.*\.(css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=5184000, immutable";
        add_header X-Cache-Status $upstream_cache_status;

        access_log off;
        log_not_found off;
    }

    # --- ROTA DINÂMICA (Node.js) ---
    location / {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_intercept_errors on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Bufferização
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Aqui o log fica ligado para você monitorar os acessos reais
        access_log /var/log/nginx/access.log otimizado;
    }
}