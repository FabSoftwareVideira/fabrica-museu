server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

upstream fabrica_backend {
    server fabrica-museu-prod:3000;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 32m;

    # Compressão de respostas
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    error_page 404 /errors/404.html;
    error_page 502 /errors/502.html;
    error_page 500 503 504 /errors/50x.html;

    location ^~ /errors/ {
        root /etc/nginx;
        internal;
    }

    # Cache agressivo para thumbnails (imagens com _thumb no nome)
    location ~* ^/public/photos/.*_thumb\.(webp|jpg|jpeg|png)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Cache por 30 dias para thumbnails
        proxy_cache_valid 200 30d;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Cache para imagens originais (menor, pois podem ser atualizadas)
    location ~* ^/public/photos/.*\.(webp|jpg|jpeg|png|gif|bmp|tiff)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Cache por 7 dias para imagens originais
        proxy_cache_valid 200 7d;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Cache para assets estáticos (CSS, JS)
    location ~* ^/public/.*\.(css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Cache por 60 dias para assets imutáveis
        proxy_cache_valid 200 60d;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header Cache-Control "public, max-age=5184000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Rotas dinâmicas sem cache
    location / {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_intercept_errors on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Buffer otimizado para streaming
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
}
