limit_req_zone $binary_remote_addr zone=prod_perip_req:10m rate=15r/s;
limit_conn_zone $binary_remote_addr zone=prod_perip_conn:10m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;
    server_tokens off;

    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 32m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 20s;
    send_timeout 15s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    error_page 404 /errors/404.html;
    error_page 502 /errors/502.html;
    error_page 500 503 504 /errors/50x.html;

    location ^~ /errors/ {
        root /etc/nginx;
        internal;
    }

    location ~ /\.[^/]+ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        limit_req zone=prod_perip_req burst=30 nodelay;
        limit_conn prod_perip_conn 20;
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://fabrica-museu-prod:3000;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_hide_header X-Powered-By;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
