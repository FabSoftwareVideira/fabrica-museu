# 1. Definição do formato de log (Mesmo padrão de prod para manter consistência)
log_format otimizado '$remote_addr - $remote_user [$time_local] '
'"$request" $status $body_bytes_sent '
'"$http_referer" "$http_user_agent" '
'rt=$request_time urt=$upstream_response_time '
'cache=$upstream_cache_status';

# 2. Backend de Desenvolvimento
upstream fabrica_backend {
    server fabrica-museu-dev:3000;
    keepalive 16;
}

# 3. Redirecionamento HTTP -> HTTPS (Mantendo a porta 8443 de dev)
server {
    listen 80;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

# 4. Servidor Principal (Dev)
server {
    listen 443 ssl;
    server_name _;

    # Logs - Usando o formato novo
    access_log /var/log/nginx/access.log otimizado;
    error_log /var/log/nginx/error.log warn;

    # Identificação de IP Real (Importante se usar Docker Desktop ou WSL2)
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;

    # SSL
    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Segurança e Limites
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    client_max_body_size 32m;

    # Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    # Páginas de Erro
    error_page 404 /errors/404.html;
    error_page 502 /errors/502.html;
    error_page 500 503 504 /errors/50x.html;

    location ^~ /errors/ {
        root /etc/nginx;
        internal;
    }

    # --- CACHE: Thumbnails (Dev: 7 dias) ---
    location ~* ^/public/photos/.*_thumb\.(webp|jpg|jpeg|png)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;

        # Silenciar logs de assets para não poluir o terminal de dev
        access_log off;
        log_not_found off;
    }

    # --- CACHE: Imagens Originais (Dev: 1 dia) ---
    location ~* ^/public/photos/.*\.(webp|jpg|jpeg|png|gif|bmp|tiff)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Cache-Status $upstream_cache_status;

        access_log off;
        log_not_found off;
    }

    # --- CACHE: Assets Estáticos (CSS, JS - Dev: 7 dias) ---
    location ~* ^/public/.*\.(css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;

        # Desligar log para focar nas rotas do Node
        access_log off;
        log_not_found off;
    }

    # --- ROTA DINÂMICA (Node.js) ---
    location / {
        proxy_pass http://fabrica_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_intercept_errors on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Log ativo apenas para chamadas de API e navegação de páginas
        access_log /var/log/nginx/access.log otimizado;
    }
}