limit_req_zone $binary_remote_addr zone=dev_perip_req:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=dev_perip_conn:10m;

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 32m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 20s;
    send_timeout 15s;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    error_page 404 /errors/404.html;
    error_page 502 /errors/502.html;
    error_page 500 503 504 /errors/50x.html;

    location ^~ /errors/ {
        root /etc/nginx;
        internal;
    }

    location ~ /\.[^/]+ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        limit_req zone=dev_perip_req burst=40 nodelay;
        limit_conn dev_perip_conn 30;
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://fabrica-museu-dev:3000;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_hide_header X-Powered-By;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
