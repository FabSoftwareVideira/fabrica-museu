services:
  fabrica-museu-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: fabrica-museu-dev
    working_dir: /app
    profiles: ['dev']
    env_file:
      - .env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
    expose:
      - '3000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:3000/health").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

  fabrica-museu-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: fabrica-museu-prod
    working_dir: /app
    profiles: ['prod']
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      TRUST_PROXY: 'true'
    command: npm start
    expose:
      - '3000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:3000/health").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5
    networks:
      - fabrica-network

networks:
  fabrica-network:
    external: true
