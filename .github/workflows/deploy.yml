name: Deploy fabrica-museu

on:
  push:
    # branches:
    #   - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy para Produção na VPS da BRDrive
    runs-on: self-hosted

    steps:
      # ── 1. PREPARAÇÃO ───────────────────────────────────────────────────────
      - name: 📂 Checkout do Código
        uses: actions/checkout@v4

      - name: 🏷️ Definir versão do build
        run: |
          echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Gerar .env a partir do ENV_FILE do repositório
        env:
          ENV_FILE_SECRET: ${{ secrets.ENV_FILE }}
          ENV_FILE_VAR: ${{ vars.ENV_FILE }}
        run: |
          echo "Gerando .env para o deploy..."

          ENV_CONTENT="$ENV_FILE_SECRET"
          if [ -z "$ENV_CONTENT" ]; then
            ENV_CONTENT="$ENV_FILE_VAR"
          fi

          if [ -z "$ENV_CONTENT" ]; then
            echo "ERRO: ENV_FILE não definido em secrets ou vars do repositório."
            exit 1
          fi

          printf '%s' "$ENV_CONTENT" > .env

          echo "Arquivo .env criado com sucesso para o deploy."

      - name: Validar Ambiente e Arquivos
        run: |
          echo "Verificando arquivos críticos..."
          test -f docker-compose.yml || (echo "ERRO: docker-compose.yml não encontrado" && exit 1)
          test -f .env || (echo "ERRO: .env não encontrado" && exit 1)

          echo "Validando sintaxe do Docker Compose de Produção..."
          docker compose -f docker-compose.yml --profile prod config -q

      - name: ✅ Testes de Qualidade
        run: |
          echo "Instalando dependências..."
          npm install --prefer-offline --no-audit

          echo "Executando suite de testes..."
          npm test || (echo "❌ ERRO: Testes falharam. Deploy abortado." && exit 1)

          echo "✅ Todos os testes passaram com sucesso!"

      # ── 2. EXECUÇÃO ─────────────────────────────────────────────────────────
      - name: Atualizar e Subir Containers
        run: |
          echo "Puxando imagens novas (se houver)..."
          docker compose -f docker-compose.yml --profile prod pull --quiet || true

          echo "Iniciando serviços de produção..."
          # Usando o arquivo de produção para subir o stack
          docker compose -f docker-compose.yml --profile prod up -d --build --remove-orphans --wait

      # ── 3. MANUTENÇÃO (PÓS-DEPLOY) ──────────────────────────────────────────
      - name: Status Final
        run: |
          echo "--- Containers Ativos ---"
          docker compose -f docker-compose.yml --profile prod ps

          echo "--- Consumo de Recursos ---"
          # O nome do container deve ser o que está no seu docker-compose.yml
          docker stats --no-stream fabrica-museu-prod

      - name: Limpar arquivo .env temporário
        if: always()
        run: rm -f .env
